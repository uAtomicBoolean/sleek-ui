title: Accessability
description: ""
sections:
  - title: Accessability properties
    description:
      -
        - text: All widgets implement some basis of accessabity such as the role, the default action, etc.
      -
        - text: However, it is recommended to fine tune these properties to fit your application as much as possible.
      -
        - text: "You can look at the "
        - link: UButton
          url: https://github.com/uAtomicBoolean/sleek-ui/blob/main/ui/sleek-ui/widgets/button/button.slint
        - text: " or "
        - link: USlider
          url: https://github.com/uAtomicBoolean/sleek-ui/blob/main/ui/sleek-ui/widgets/slider.slint
        - text: " implementation to get an idea of what has been done in sleek-ui."
  - title: Keyboard integration
    description:
      -
        - text: Some widgets have some level of keyboard integration allow to manipulate the linked value.
      -
        - text: "Take the "
        - link: slider
          url: slider
          local: true
        - text: " as an example, you can change its value with the keyboard arrow keys."
      -
        - text: "Moreover, the "
        - link: ButtonInterface
          url: button-interface
          local: true
        - text: " widget fires the "
        - code: clicked
        - text: " callback the space bar or the enter key are pressed on a focused widget."
  - title: Tab navigation
    description:
      -
        - text: In order to ease the tab navigation, all widgets implements a strong display of the focused state when gaining the focus from tab navigation.
      -
        - text: "This is made possible with the "
        - code: has-tab-focus
        - text: " property from "
        - link: ButtonInterface
          url: button-interface
          local: true
        - text: .
      -
        - text: You can check the tab navigation display by pressing tab.