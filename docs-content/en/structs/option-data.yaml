title: UOptionData
description: A struct used to define the choices in a select or radio.
sections:
  - title: Definition
    code: "UOptionData {\n    // The visual text of the value.\n    text: string,\n\n    // The value that can be used in your logic to check the current value.\n    value: string,\n\n    // Weither the option is enabled or not.\n    // A disabled option will be greyed out and not selectable.\n    // Note that you must set it to true as the default value of a boolean in Slint is false.\n    enabled: bool,\n}"
